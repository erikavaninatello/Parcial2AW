<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Biblioteca</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Arial, sans-serif; }
        .card { background: #16213e; border: 1px solid #0f3460; border-radius: 12px; padding: 2.5rem; min-width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        h1 { color: #e94560; font-size: 1.6rem; margin-bottom: 0.3rem; }
        p  { color: #a0a0b0; font-size: 0.9rem; margin-bottom: 1.8rem; }
        label { display: block; color: #c0c0d0; font-size: 0.85rem; margin-bottom: 0.3rem; font-weight: 500; }
        input { width: 100%; padding: 0.6rem 0.8rem; background: #0f3460; border: 1px solid #1a4a80; border-radius: 6px; color: #fff; font-size: 1rem; margin-bottom: 1.2rem; outline: none; }
        input:focus { border-color: #e94560; }
        button { width: 100%; padding: 0.75rem; background: #e94560; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:hover { background: #c73652; }
        #error-msg { color: #e94560; font-size: 0.85rem; margin-top: 0.8rem; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h1> Biblioteca</h1>
        <p>Iniciá sesión para acceder al sistema</p>
        <form id="form-login">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" name="usuario" placeholder="admin" required>
            <label for="pass">Contraseña</label>
            <input type="password" id="pass" name="pass" placeholder="••••••••" required>
            <button type="submit">Ingresar</button>
        </form>
        <p id="error-msg">Usuario o contraseña incorrectos</p>
    </div>
    <script>
        // Enviamos credenciales al backend con fetch para evitar recarga de página
        document.getElementById('form-login').addEventListener('submit', function(event) {
            event.preventDefault()
            const usuario = document.getElementById('usuario').value
            const pass    = document.getElementById('pass').value
            fetch('/autenticar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, pass })
            }).then(response => {
                if (!response.ok) {
                    document.getElementById('error-msg').style.display = 'block'
                } else {
                    if (response.redirected) window.location.href = response.url
                }
            })
        })
    </script>
</body>
</html>
